# Mise configuration for docs development.
# Install mise: https://mise.jdx.dev/getting-started.html
# Then run: mise trust && mise install

[tools]
# Node.js LTS. Mintlify does not support Node 25+.
node = "22"

# Python version matches requires-python in pyproject.toml.
python = "3.13"

# Python package manager used by this repo. Match .github/actions/uv_setup.
uv = "0.9.26"

# Fast Rust reimplementation of pre-commit.
# Installs git hooks from .pre-commit-config.yaml.
prek = "latest"

# Prose linter used by the lint-prose CI workflow.
vale = "3.12.0"

# Mintlify CLI used by the broken-links Makefile targets.
"npm:mint" = "latest"

# Mise hooks are gated behind an experimental flag. Opt in here so the
# postinstall hook below runs without each contributor enabling
# `experimental` globally.
[settings]
experimental = true

# After `mise install`, wire prek's git hooks into .git/hooks so checks in
# .pre-commit-config.yaml run on every commit and push.
# Safe to re-run: `prek install` is idempotent.
[hooks]
postinstall = "prek install --hook-type pre-commit --hook-type pre-push"
